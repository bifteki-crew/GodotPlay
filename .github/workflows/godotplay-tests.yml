name: GodotPlay Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0"

      - name: Restore
        run: dotnet restore src/GodotPlay.Tests

      - name: Build
        run: dotnet build src/GodotPlay.Tests --no-restore

      - name: Unit Tests
        run: dotnet test src/GodotPlay.Tests --filter "Category!=Integration" --no-build -v normal

  mcp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "18"

      - name: Install MCP dependencies
        run: cd src/godotplay-mcp && npm ci

      - name: Build MCP server
        run: cd src/godotplay-mcp && npm run build

  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0"

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: true

      - name: Build demo project
        run: cd demo && dotnet build

      - name: Import demo project
        run: godot --path demo --headless --editor --quit || true

      - name: Integration Tests
        run: GODOT_PATH=godot dotnet test src/GodotPlay.Tests --filter "Category=Integration" -v normal
        timeout-minutes: 5
